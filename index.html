<!DOCTYPE html>
<html>
<head>
    <title>JSON Output</title>
</head>
<body>
    <input type="text" id="u" placeholder="Username">
    <button onclick="s()">Search</button>

    <pre id="r"></pre>

    <script>
        async function s() {
            const u = document.getElementById('u').value;
            const r = document.getElementById('r');
            
            if(!u) return;

            try {
                // Aapki Vercel API call
                const res = await fetch(`/api/search?username=${encodeURIComponent(u)}`);
                const data = await res.json();
                
                // Same to same JSON output
                r.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                r.textContent = "Error fetching data.";
            }
        }
    </script>
</body>
  </html>
